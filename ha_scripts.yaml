# =============================================================================
# Scripts Home Assistant - Monitor Listener (MQTT + DDC/CI)
#
# Tópicos:
#   macbook/comando/monitor  → Listener macOS (m1ddc)
#   windows/comando/monitor  → Listener Windows (dxva2)
#
# Ambos os listeners conseguem trocar o input do monitor via DDC/CI.
# Enviamos para os dois tópicos para redundância.
# =============================================================================


# ---------------------------------------------------------------------------
# TELA WINDOWS - Apenas troca o monitor para HDMI (Windows)
# ---------------------------------------------------------------------------
tela_windows:
  alias: Tela Windows
  description: "Troca o input do monitor para Windows (HDMI1) via DDC/CI"
  icon: mdi:monitor-screenshot
  sequence:
    - action: mqtt.publish
      data:
        topic: macbook/comando/monitor
        payload: ir_windows
        qos: 0
        retain: false
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: ir_windows
        qos: 0
        retain: false


# ---------------------------------------------------------------------------
# TELA MAC - Apenas troca o monitor para DisplayPort (Mac)
# ---------------------------------------------------------------------------
tela_mac:
  alias: Tela Mac
  description: "Troca o input do monitor para Mac (DisplayPort 1) via DDC/CI"
  icon: mdi:monitor-screenshot
  sequence:
    - action: mqtt.publish
      data:
        topic: macbook/comando/monitor
        payload: ir_mac
        qos: 0
        retain: false
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: ir_mac
        qos: 0
        retain: false


# ---------------------------------------------------------------------------
# WINDOWS - Switch completo: KVM → espera → DDC → extend
#
# Ordem importa! O KVM faz hot-plug dos 2 monitores no Windows.
# Se trocar DDC antes do KVM, o Windows recebe os monitores "no meio"
# da transição e espelha. A ordem certa é:
#   1. KVM primeiro (Windows recebe os 2 monitores)
#   2. Espera o hot-plug estabilizar
#   3. DDC troca o monitor direto
#   4. Extend força modo estendido (corrige espelhamento)
# ---------------------------------------------------------------------------
windows:
  alias: Windows
  description: "Muda tudo para Windows: KVM + monitor (HDMI) + força estender telas"
  icon: mdi:microsoft-windows
  sequence:
    # 1) KVM primeiro - Windows recebe os monitores
    - action: switch.turn_on
      target:
        entity_id: switch.kvm_switch_1
      data: {}
    # 2) Espera Windows detectar os monitores do KVM
    - delay:
        seconds: 5
    # 3) Força modo estendido (corrige espelhamento do hot-plug)
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: extend
        qos: 0
        retain: false
    # 4) DDC troca o monitor direto para HDMI (Windows)
    - delay:
        seconds: 1
    - action: mqtt.publish
      data:
        topic: macbook/comando/monitor
        payload: ir_windows
        qos: 0
        retain: false
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: ir_windows
        qos: 0
        retain: false


# ---------------------------------------------------------------------------
# MAC - Switch completo: monitor + KVM + bloquear Windows
# ---------------------------------------------------------------------------
mac:
  alias: Mac
  description: "Muda tudo para Mac: monitor (DP) + KVM + bloqueia Windows"
  icon: mdi:apple
  sequence:
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: bloquear
        qos: 0
        retain: false
    - delay:
        milliseconds: 500
    - action: mqtt.publish
      data:
        topic: macbook/comando/monitor
        payload: ir_mac
        qos: 0
        retain: false
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: ir_mac
        qos: 0
        retain: false
    - action: switch.turn_off
      target:
        entity_id: switch.kvm_switch_1
      data: {}


# ---------------------------------------------------------------------------
# BLOQUEAR WINDOWS - Bloqueia a estação via MQTT (Win+L)
# ---------------------------------------------------------------------------
bloquear_windows:
  alias: Bloquear Windows
  description: "Bloqueia o Windows remotamente via MQTT (Win+L)"
  icon: mdi:account-cancel
  sequence:
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: bloquear
        qos: 0
        retain: false
