# =============================================================================
# Scripts Home Assistant - Monitor Listener (MQTT + DDC/CI)
#
# Tópicos:
#   macbook/comando/monitor  → Listener macOS (m1ddc)
#   windows/comando/monitor  → Listener Windows (dxva2)
#
# Ambos os listeners conseguem trocar o input do monitor via DDC/CI.
# Enviamos para os dois tópicos para redundância.
# =============================================================================


# ---------------------------------------------------------------------------
# TELA WINDOWS - Apenas troca o monitor para HDMI (Windows)
# ---------------------------------------------------------------------------
tela_windows:
  alias: Tela Windows
  description: "Troca o input do monitor para Windows (HDMI1) via DDC/CI"
  icon: mdi:monitor-screenshot
  sequence:
    - action: mqtt.publish
      data:
        topic: macbook/comando/monitor
        payload: ir_windows
        qos: 0
        retain: false
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: ir_windows
        qos: 0
        retain: false


# ---------------------------------------------------------------------------
# TELA MAC - Apenas troca o monitor para DisplayPort (Mac)
# ---------------------------------------------------------------------------
tela_mac:
  alias: Tela Mac
  description: "Troca o input do monitor para Mac (DisplayPort 1) via DDC/CI"
  icon: mdi:monitor-screenshot
  sequence:
    - action: mqtt.publish
      data:
        topic: macbook/comando/monitor
        payload: ir_mac
        qos: 0
        retain: false
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: ir_mac
        qos: 0
        retain: false


# ---------------------------------------------------------------------------
# WINDOWS - Switch completo: wake → KVM → extend → DDC
#
# Ordem:
#   1. Wake acorda o Windows (pode estar em standby parcial)
#   2. KVM troca (Windows recebe os 2 monitores)
#   3. Extend força modo estendido via API nativa
#   4. DDC troca o monitor direto (ROG Strix)
# ---------------------------------------------------------------------------
windows:
  alias: Windows
  description: "Muda tudo para Windows: wake + KVM + extend + DDC"
  icon: mdi:microsoft-windows
  sequence:
    # 1) Acorda o Windows antes de trocar o KVM
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: wake
        qos: 0
        retain: false
    - delay:
        seconds: 1
    # 2) KVM troca - Windows recebe os monitores
    - action: switch.turn_on
      target:
        entity_id: switch.kvm_switch_1
      data: {}
    - delay:
        seconds: 3
    # 3) Força modo estendido via API nativa
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: extend
        qos: 0
        retain: false
    - delay:
        milliseconds: 500
    # 4) DDC troca o monitor direto para HDMI (Windows)
    - action: mqtt.publish
      data:
        topic: macbook/comando/monitor
        payload: ir_windows
        qos: 0
        retain: false
    - delay:
        seconds: 3
    # 5) Reinicia Fifine Control Desk (USB reconectou via KVM)
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: restart_fifine
        qos: 0
        retain: false


# ---------------------------------------------------------------------------
# MAC - Switch completo: DDC → KVM → reforço DDC no Mac
#
# Ordem:
#   1. Windows faz DDC para DP (Mac) - enquanto ainda tem o monitor
#   2. KVM troca - Mac recebe os 2 monitores HDMI
#   3. Mac reforça DDC (re-detecta display + confirma DP)
# ---------------------------------------------------------------------------
mac:
  alias: Mac
  description: "Muda tudo para Mac: DDC + KVM + reforço"
  icon: mdi:apple
  sequence:
    # 1) Windows muda DDC para DP (Mac) enquanto ainda tem o monitor
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: ir_mac
        qos: 0
        retain: false
    - delay:
        milliseconds: 500
    # 2) KVM troca - Mac recebe os 2 monitores HDMI
    - action: switch.turn_on
      target:
        entity_id: switch.kvm_switch_1
      data: {}
    - delay:
        seconds: 2
    # 3) Mac reforça DDC (re-detecta display + confirma DP)
    - action: mqtt.publish
      data:
        topic: macbook/comando/monitor
        payload: ir_mac
        qos: 0
        retain: false


# ---------------------------------------------------------------------------
# BLOQUEAR WINDOWS - Bloqueia a estação via MQTT (Win+L)
# ---------------------------------------------------------------------------
bloquear_windows:
  alias: Bloquear Windows
  description: "Bloqueia o Windows remotamente via MQTT (Win+L)"
  icon: mdi:account-cancel
  sequence:
    - action: mqtt.publish
      data:
        topic: windows/comando/monitor
        payload: bloquear
        qos: 0
        retain: false
